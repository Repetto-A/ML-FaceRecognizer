# Frontend Somos Huella — red Docker compartida con Caddy (projects_web)
services:
  somoshuella-web:
    container_name: somoshuella-web
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../../frontend/.env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - projects_web

networks:
  projects_web:
    external: true
